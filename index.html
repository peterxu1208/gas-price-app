<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Hope Ave Fuel — Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="map"></div>
<div id="edgeIndicators"></div>
<button class="locate-btn" id="locateBtn" title="Stations near me" aria-label="Find stations near my current location">
  <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2L4.5 20l7.5-4.2L19.5 20z"/></svg>
</button>

<div class="topbar">
  <div class="topcard">
    <form class="trow searchrow" id="searchForm" autocomplete="off" role="search">
      <svg class="search-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="searchInput" type="text" placeholder="Search a location…" aria-label="Search a location" enterkeyhint="search">
      <button type="button" id="searchClear" class="search-clear" title="Clear search" aria-label="Clear search" hidden>✕</button>
    </form>
    <div class="trow toprow">
      <div class="ttl">
        <h1 id="locName">Hope Ave</h1>
      </div>
      <span class="stamp"><span class="live-dot"></span><span id="syncStamp">checking data…</span></span>
    </div>
    <div class="trow">
      <div class="seg" id="gradeSeg">
        <button data-grade="REGULAR_UNLEADED">Reg</button>
        <button data-grade="MIDGRADE">Mid</button>
        <button class="on" data-grade="PREMIUM">Prem</button>
      </div>
    </div>
    <div class="trow brandrow">
      <div class="brandfilter" id="brandFilter"></div>
    </div>
  </div>
  <div class="home-float" id="homeFloat">
    <button type="button" class="home-chip" id="homeGo" disabled title="Go to your home location" aria-label="Go to your home location">
      <svg class="home-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      <span id="homeLabel">No home set</span>
    </button>
    <button type="button" class="home-edit" id="homeEdit" title="Set home address" aria-label="Set home address">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
</div>

<!-- Set-home address editor — screen-level modal (opened by the gear button). -->
<div class="home-modal" id="homeModal" hidden>
  <div class="home-modal-backdrop" id="homeModalClose"></div>
  <form class="home-modal-card" id="homeEditForm" role="dialog" aria-modal="true" aria-label="Set home address">
    <div class="home-modal-title">Set home address</div>
    <div class="home-input-wrap">
      <input id="homeInput" type="text" placeholder="Enter a home address…" aria-label="Home address" enterkeyhint="done" autocomplete="off">
      <button type="button" id="homeInputClear" class="home-input-clear" title="Clear" aria-label="Clear text" hidden>✕</button>
    </div>
    <div class="home-modal-actions">
      <button type="button" id="homeCancel" class="home-cancel">Cancel</button>
      <button type="submit" class="home-save">Save</button>
    </div>
  </form>
</div>

<!-- Leaflet (CDN), then data.js (sample-data fixture), then services.js (the single
     external-data boundary — swap seam for Google APIs), then app.js (UI + logic).
     Plain <script> tags + relative paths: no build step, opens directly via file://. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="data.js"></script>
<script src="services.js"></script>
<script src="app.js"></script>
</body>
</html>
